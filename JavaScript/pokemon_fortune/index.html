<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokemon fortune</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="header">
      <span class="sparkle">✦</span>
      <span class="sparkle">✦</span>
      <span class="sparkle">✦</span>
      <span class="sparkle">✦</span>
      <h1>[ Pokémon Fortune ]</h1>
      <div id="tabs">
        <button class="tab-btn active" id="tab-roulette">Roulette</button>
        <button class="tab-btn" id="tab-historique">Historique</button>
      </div>
    </div>

    <div id="layout">
      <div id="section-roulette">
        <div id="slot-side">
          <div id="slot-frame"></div>
          <button id="btn">▶ LANCER LA ROULETTE ◀</button>
        </div>
        <div id="card">
          <span class="card-corner tl">✦</span>
          <span class="card-corner tr">✦</span>
          <span class="card-corner bl">✦</span>
          <span class="card-corner br">✦</span>
          <p id="card-header">✦ CARTE DU JOUR ✦</p>
          <img id="pokemon-image" />
          <p id="pokemon-name"></p>
          <p id="pokemon-type"></p>
          <div class="card-line"></div>
          <p id="pokemon-message"></p>
          <p class="card-stars">✦ ✦ ✦</p>
        </div>
      </div>
      <div id="section-historique">
        <div id="history-grid"></div>
      </div>
    </div>

    <div id="footer">
      <p>Pokémon Fortune © 2003</p>
    </div>
    <script src="script.js"></script>
  </body>
</html>
